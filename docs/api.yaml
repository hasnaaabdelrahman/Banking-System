openapi: 3.0.0
info:
  title: Banking System
  description:  API documentation for Banking System
  version: 1.0.0

paths:
  /register:
    post:
      tags:
        - Authentication
      summary: register into the system
      description: this is endpoint for register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
  /login:
    post:
      tags:
        - Authentication
      summary: login into the system
      description: this is endpoint for login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: User logged successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /bank-account:
      post:
        tags:
          - Bank Account
        summary: Create a new bank account
        description: Creates a new bank account for a registered user.
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankRequest'
        responses:
          '201':
            description: Bank account created successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/BankResponse'

  /bank-account/{id}:
      get:
        tags:
          - Bank Account
        summary: Get a bank account by id
        description: Retrieve a bank account using its unique identifier.
        parameters:
          - name: id
            in: path
            required: true
            description: Bank account id
            schema:
              type: string
              example: acc-001
        responses:
          '200':
            description: Bank account is found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/BankResponse'

  /bank-account/{user_id}:
      get:
        tags:
          - Bank Account
        summary: Get a bank account by user id
        description: Retrieve a bank account using its unique identifier.
        parameters:
          - name: user_id
            in: path
            required: true
            description: user id
            schema:
              type: string
              example: user-001
        responses:
          '200':
            description: Bank account is found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/BankResponse'

  /bank-account/{account_id}:
    put:
      tags:
        - Bank Account
      summary: update a bank account by account id
      description: update a bank account using its unique identifier.
      parameters:
        - name: account_id
          in: path
          required: true
          description: account id
          schema:
            type: string
            example: acc-001
      requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountRequest'

      responses:
        '200':
          description: Bank account updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankResponse'

  /bank-account/{bank_account_id}:
    delete:
      tags:
        - Bank Account
      summary: delete a bank account by account id
      description: delete a bank account using its unique identifier.
      parameters:
        - name: bank_account_id
          in: path
          required: true
          description: bank account id
          schema:
            type: string
            example: acc-001

      responses:
        '204':
          description: Bank account deleted successfully

  /transaction:
    post:
      tags:
        - Transaction
      summary: make a new transaction
      description: this is endpoint for create a new transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'

  /transaction/{id}:
    get:
      tags:
        - Transaction
      summary: Get a transaction by id
      description: Retrieve a transaction using its unique identifier.
      parameters:
        - name: id
          in: path
          required: true
          description: id
          schema:
            type: string
            example: transaction-001
      responses:
        '200':
          description: Transaction is found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'

  /transactions/{account_id}:
    get:
      tags:
        - Transaction
      summary: Get a transaction by account id
      description: Retrieve transactions using its bank account id.
      parameters:
        - name: account_id
          in: path
          required: true
          description: account id
          schema:
            type: string
            example: acc-001
      responses:
        '200':
          description: Transaction is found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'

  /transactions:
    get:
      tags:
        - Transaction
      summary: Get all transactions
      description: Retrieve all transactions.
      responses:
        '200':
          description: Transaction is found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'


  /transaction/{_id}:
    put:
      tags:
        - Transaction
      summary: update a transaction by id
      description: update a transaction using its unique identifier.
      parameters:
        - name: _id
          in: path
          required: true
          description: transaction id
          schema:
            type: string
            example: tr-001
      requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionRequest'
      responses:
        '200':
          description: Transaction updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'

  /transaction/{transaction_id}:
    delete:
      tags:
        - Transaction
      summary: Delete transaction by transaction id
      description: Delete Transaction
      parameters:
        - name:
            transaction_id
          in: path
          description: transaction id
          schema:
            type: string
            example: tr-00
      responses:
        '204':
          description: Transaction deleted successfully
components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
        - first_name
        - last_name
        - age
      properties:
        username:
          type: string
          example: user_123
        email:
          type: string
          example: user@example.com
        first_name:
          type: string
          example: john
        last_name:
          type: string
          example: joe
        password:
          type: string
          example: password@123
        age:
          type: integer
          example: 28
        img_url:
          type: string
          example: https://example.com/profile.png

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
        example: User registered successfully

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        message:
          type: string
        example: User registered successfully

    BankRequest:
          type: object
          required:
            - user_id
            - account_type
          properties:
            user_id:
              type: string
              example: "123e4567-e89b-12d3-a456-426614174000"
            account_type:
              type: string
              enum:
                - SAVINGS
                - CURRENT
              example: SAVINGS

    BankAccountRequest:
          type: object
          required:
            - account_type
            - balance
            - is_active
          properties:
            balance:
              type: number
              example: 10000
            is_active:
              type: boolean
              example: true
            account_type:
              type: string
              enum:
                - SAVINGS
                - CURRENT
              example: SAVINGS
    BankResponse:
      type: object
      properties:
        id:
          type: string
          example: "acc-001"
        user_id:
          type: string
          example: "user-001"
        account_number:
          type: string
          example: "1234567890"
        balance:
          type: number
          example: 0.0
        account_type:
          type: string
          example: SAVINGS
        is_active:
          type: boolean
          example: true

    TransactionRequest:
      type: object
      required:
        - account_id
        - transaction_type
        - amount
      properties:
        account_id:
          type: string
          example: "acc-001"

        transaction_type:
          type: string
          enum:
            - DEPOSIT
            - WITHDRAW
            - TRANSFER
          example: DEPOSIT

        amount:
          type: number
          format: float
          example: 1000.45


    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          example: "123e4567-e89b-12d3-a456-426614174000"

        account_id:
          type: string
          example: "acc-001"

        transaction_type:
          type: string
          enum:
            - DEPOSIT
            - WITHDRAW
            - TRANSFER
          example: DEPOSIT

        amount:
          type: number
          format: float
          example: 1000.45

        date:
          type: string
          format: date-time
          example: "2026-07-11T10:30:00"

